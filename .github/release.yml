changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: "🚀 New Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "📖 Documentation"
      labels:
        - documentation
        - docs
    - title: "🏗️ Infrastructure"
      labels:
        - ci
        - infrastructure
        - devops
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "🔄 Other Changes"
      labels:
        - "*"
