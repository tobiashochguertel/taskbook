name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.5.2)"
        required: true
        type: string
      build_embedded:
        description: "Also build the embedded server+WebUI binary"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  # Strip 'v' prefix for Docker image tags (e.g. v1.7.4 → 1.7.4)
  RELEASE_VERSION: ${{ inputs.tag && format('{0}', inputs.tag) || github.ref_name }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-client:
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tb-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: tb-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tb-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tb-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: tb-windows-x86_64
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: tb-windows-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build client
        run: cargo build --release --package taskbook-client --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../../../${{ matrix.name }}.zip tb.exe
          else
            tar czvf ../../../${{ matrix.name }}.tar.gz tb
          fi
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  build-server:
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tb-server-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: tb-server-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tb-server-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tb-server-darwin-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Create empty WebUI dist (no embedded UI)
        run: mkdir -p packages/taskbook-webui/dist && touch packages/taskbook-webui/dist/.gitkeep

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.target }}

      - name: Build server
        run: cargo build --release --package taskbook-server --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }}.tar.gz tb-server
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  build-server-embedded:
    needs: [ci]
    if: inputs.build_embedded == true
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tb-server-embedded-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: tb-server-embedded-linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build WebUI
        run: |
          cd packages/taskbook-webui
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: server-embedded-${{ matrix.target }}

      - name: Build server (with embedded WebUI)
        run: cargo build --release --package taskbook-server --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }}.tar.gz tb-server
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  docker-server:
    needs: [build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download server binary (x86_64)
        uses: actions/download-artifact@v6
        with:
          name: tb-server-linux-x86_64
          path: artifacts

      - name: Download server binary (aarch64)
        uses: actions/download-artifact@v6
        with:
          name: tb-server-linux-aarch64
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          tar xzf artifacts/tb-server-linux-x86_64.tar.gz -C binaries/amd64
          tar xzf artifacts/tb-server-linux-aarch64.tar.gz -C binaries/arm64
          chmod +x binaries/amd64/tb-server binaries/arm64/tb-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-server
          cache-to: type=gha,mode=max,scope=docker-server

  docker-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-webui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push WebUI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.webui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-webui
          cache-to: type=gha,mode=max,scope=docker-webui

  docker-client:
    needs: [build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download client binary (x86_64)
        uses: actions/download-artifact@v6
        with:
          name: tb-linux-x86_64
          path: artifacts

      - name: Download client binary (aarch64)
        uses: actions/download-artifact@v6
        with:
          name: tb-linux-aarch64
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          tar xzf artifacts/tb-linux-x86_64.tar.gz -C binaries/amd64
          tar xzf artifacts/tb-linux-aarch64.tar.gz -C binaries/arm64
          chmod +x binaries/amd64/tb binaries/arm64/tb

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag || github.ref_name }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-client
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.client
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-client
          cache-to: type=gha,mode=max,scope=docker-client

  release:
    needs: [build-client, build-server, docker-server, docker-webui, docker-client]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: tb-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
